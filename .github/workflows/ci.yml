name: CI

on:
  pull_request:
  push:
    branches: ["overhaul/infinity_orchestrator"]

jobs:
  check:
    name: Rust fmt/clippy/build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings -W unreachable_pub -W clippy::pedantic -W clippy::nursery -A clippy::missing_errors_doc -A clippy::missing_panics_doc

      - name: Cargo test
        run: cargo test --all-targets --locked

      - name: Cargo build
        run: cargo build --release
