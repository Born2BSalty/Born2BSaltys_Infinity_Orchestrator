<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Infinity Orchestrator · Wireframe (preview)</title>
<style>
  @font-face { font-family: 'Poppins'; font-style: normal; font-weight: 300; font-display: swap; src: url('poppins-300.woff2') format('woff2'); }
  @font-face { font-family: 'Poppins'; font-style: normal; font-weight: 500; font-display: swap; src: url('poppins-500.woff2') format('woff2'); }
  @font-face { font-family: 'Poppins'; font-style: normal; font-weight: 700; font-display: swap; src: url('poppins-700.woff2') format('woff2'); }
  /* FiraCode Nerd kept as fallback so the Details panel icon glyphs (PUA range) still render */
  @font-face { font-family: 'FiraCode Nerd'; font-style: normal; font-weight: 300; font-display: swap; src: url('firacode-nerd-300.woff2') format('woff2'); }
</style>
<style>
  :root {
    /* Light: pale blueprint-paper palette */
    --page-bg: #e8eef5;
    --shell-bg: #f5f8fc;
    --chrome-bg: #cfdce8;
    --rail-bg: #dde6f0;
    --border-strong: #1a2638;
    --border-soft: #a5b4c7;
    --border-dashed-light: #cfd9e5;
    --text: #1a2638;
    --text-muted: #5c6a7a;
    --text-faint: #8896a8;
    --text-fainter: #aebbcb;
    --input-bg: #ffffff;
    --shadow: #1a2638;
    --dot: rgba(26,38,56,0.08);
    --scroll-track: #dde6f0;
    --scroll-thumb: #8e9eae;
    --hover-overlay: rgba(26,38,56,0.05);
    /* status / accent extras (theme-aware) */
    --success: #5fa86a;
    --status-dot: #6fb87a;
  }

  body[data-theme="dark"] {
    /* Dark: teal-on-deep-slate palette */
    --page-bg: #0B1116;
    --shell-bg: #111A21;
    --chrome-bg: #15222B;
    --rail-bg: #15222B;
    --border-strong: #24333D;
    --border-soft: #24333D;
    --border-dashed-light: #1B2730;
    --text: #E6EDF3;
    --text-muted: #A7B3BD;
    --text-faint: #6B7785;
    --text-fainter: #4d5560;
    --input-bg: #0B1116;
    --shadow: #24333D;
    --dot: rgba(230,237,243,0.05);
    --scroll-track: #15222B;
    --scroll-thumb: #24333D;
    --hover-overlay: rgba(230,237,243,0.04);
    --success: #4ADE80;
    --status-dot: #4ADE80;
    --accent-hover: #2DD4BF;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background-color: var(--page-bg);
    background-image: radial-gradient(circle at 1px 1px, var(--dot) 1px, transparent 0);
    background-size: 20px 20px;
    font-family: 'Poppins', 'FiraCode Nerd', sans-serif;
    font-weight: 300;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    min-height: 100vh;
  }
  #root { width: 100%; max-width: 1280px; }

  .sk-shell {
    background: var(--shell-bg);
    border: 2px solid var(--border-strong);
    border-radius: 6px;
    box-shadow: 6px 6px 0 var(--shadow);
    display: flex; flex-direction: column;
    overflow: hidden;
    height: calc(100vh - 48px);
    min-height: 700px;
  }
  .sk-titlebar {
    height: 34px;
    border-bottom: 1.5px solid var(--border-strong);
    background: var(--chrome-bg);
    display: flex; align-items: center;
    padding: 0 12px; gap: 12px;
    flex-shrink: 0;
  }
  .sk-traffic { display: flex; gap: 6px; }
  .sk-traffic .dot {
    width: 12px; height: 12px; border-radius: 50%;
    border: 1.2px solid var(--border-strong); background: var(--shell-bg);
  }
  .sk-title {
    flex: 1; text-align: center;
    font-family: 'Poppins', 'FiraCode Nerd', sans-serif; font-size: 10px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text);
  }
  .sk-window-ctrls { display: flex; gap: 14px; font-size: 12px; color: var(--text-muted); }

  .sk-body { display: flex; flex: 1; min-height: 0; }
  .sk-body[data-density="compact"] .sk-page { padding: 14px 18px; }
  .sk-body[data-density="compact"] .sk-nav-item { padding: 6px 10px; }

  .sk-nav {
    flex-shrink: 0;
    border-right: 1.5px solid var(--border-strong);
    background: var(--rail-bg);
    padding: 14px 10px;
    display: flex; flex-direction: column; gap: 12px;
    position: relative;
  }
  .sk-brand {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 6px 12px;
    border-bottom: 1.5px dashed var(--border-soft);
  }
  .sk-brand-mark {
    width: 36px; height: 36px;
    border: 1.5px solid var(--border-strong); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; background: var(--accent);
    box-shadow: 2px 2px 0 var(--shadow);
    flex-shrink: 0;
    color: #1a1a1a;
  }
  .sk-brand-name { font-family: 'Poppins', 'FiraCode Nerd', sans-serif; font-size: 10px; font-weight: 500; line-height: 1.1; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text); }
  .sk-brand-sub { font-size: 9px; color: var(--text-faint); letter-spacing: 1.2px; text-transform: uppercase; font-family: 'Poppins', 'FiraCode Nerd', sans-serif; }

  .sk-nav-items { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .sk-nav-item {
    all: unset;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border: 1.5px solid transparent;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Poppins', 'FiraCode Nerd', sans-serif;
    font-size: 12px;
    color: var(--text);
  }
  .sk-nav-item:hover { background: var(--hover-overlay); }
  .sk-nav-item.active {
    background: var(--accent);
    border-color: var(--border-strong);
    box-shadow: 2px 2px 0 var(--shadow);
    font-weight: 500;
    color: #1a1a1a;
  }
  .sk-nav-icon { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }

  .sk-nav-foot {
    border-top: 1.5px dashed var(--border-soft);
    padding: 10px 6px 4px;
    font-size: 11px; color: var(--text-muted);
    display: flex; align-items: center; gap: 8px;
  }
  .sk-status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--status-dot); border: 1px solid var(--border-strong); flex-shrink: 0;
  }

  .sk-main { flex: 1; overflow: auto; background: var(--shell-bg); position: relative; }
  .sk-page { padding: 24px 28px; min-height: 100%; }

  .sk-statusbar {
    height: 26px;
    border-top: 1.5px solid var(--border-strong);
    background: var(--chrome-bg);
    display: flex; align-items: center;
    padding: 0 12px; gap: 8px;
    font-family: 'Poppins', 'FiraCode Nerd', sans-serif;
    font-size: 10px; color: var(--text-muted);
    flex-shrink: 0;
  }

  .sk-annotation {
    position: absolute;
    font-family: 'Poppins', 'FiraCode Nerd', sans-serif;
    font-size: 13px;
    color: var(--accent-deep);
    max-width: 180px; line-height: 1.2;
    pointer-events: none;
  }
  .sk-anno-nav { bottom: 90px; left: 100%; transform: translateX(8px); width: 160px; }
  .sk-anno-arrow { font-size: 22px; display: inline-block; transform: translateY(2px); margin-right: 4px; }
  .sk-anno-right { top: 28px; right: 24px; text-align: right; }

  .sk-btn { cursor: pointer; transition: transform 0.05s; }
  .sk-btn:active { transform: translate(1px, 1px); }
  .sk-box { transition: none; }

  /* Details panel — row action icons appear on hover; "Copied!" forces visible */
  .details-row .details-action { opacity: 0; transition: opacity 0.12s ease-out; pointer-events: none; }
  .details-row:hover .details-action { opacity: 1; pointer-events: auto; }
  .details-row .details-action.is-copied { opacity: 1; pointer-events: auto; }

  /* Clickable pills — subtle lift + brightness on hover */
  .sk-pill { transition: filter 0.1s ease-out, transform 0.1s ease-out, box-shadow 0.1s ease-out; }
  .sk-pill.is-clickable:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 2px 0 var(--shadow); }

  /* Step 2 component tree — hover highlight + selected state; [?] reveals on hover or selected */
  .tree-row { transition: background 0.08s ease-out; }
  .tree-row:hover { background: var(--hover-overlay); }
  .tree-row.is-selected { background: rgba(20,184,166,0.18); }
  .tree-row.is-selected:hover { background: rgba(20,184,166,0.22); }
  .tree-row .tree-action { opacity: 0; transition: opacity 0.12s ease-out; pointer-events: none; }
  .tree-row:hover .tree-action,
  .tree-row.is-selected .tree-action { opacity: 1; pointer-events: auto; }

  .sk-main::-webkit-scrollbar { width: 10px; }
  .sk-main::-webkit-scrollbar-track { background: var(--scroll-track); }
  .sk-main::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border: 1px solid var(--border-strong); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
